spring.application.name=project-pulse

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/projectpulse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET:ProjectPulseSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!}
jwt.expiration-ms=86400000

# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@projectpulse.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.base-url=${BASE_URL:http://localhost:5173}
app.admin-email=${ADMIN_EMAIL:admin@projectpulse.com}
app.admin-password=${ADMIN_PASSWORD:Admin123!}
app.admin-first-name=${ADMIN_FIRST_NAME:System}
app.admin-last-name=${ADMIN_LAST_NAME:Admin}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
